<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Signer - توقيع المعاملات (BSC)</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#000;font-family:system-ui;padding:16px;color:#eee;}
        .card{background:#111;border-radius:28px;padding:20px;margin-bottom:20px;border:1px solid #2c2c2c;}
        .card-title{color:#F5B041;font-weight:bold;margin-bottom:15px;font-size:20px;}
        input,textarea{width:100%;padding:14px;background:#1e1e1e;border:1px solid #333;border-radius:28px;color:white;font-size:14px;margin:8px 0;font-family:monospace;}
        button{background:#F5B041;color:#000;border:none;padding:14px;border-radius:40px;font-weight:bold;width:100%;margin-top:12px;cursor:pointer;transition:0.2s;}
        button:active{transform:scale(0.97);}
        .copy-btn{background:#F5B041;margin-top:6px;padding:10px;}
        .result-area{background:#1a1a1a;border-radius:20px;padding:12px;margin-top:15px;}
        .warning-note{color:#F5B041;margin-top:8px;font-size:12px;}
        .info-text{font-size:13px;line-height:1.4;color:#aaa;}
        .example-btn{background:#2c2c2c;color:#F5B041;margin-top:8px;padding:8px;font-size:12px;}
    </style>
</head>
<body>
<div style="max-width:600px;margin:0 auto;">
    <div class="card">
        <div class="card-title">✍️ توقيع المعاملات (BSC Signer)</div>
        
        <input type="text" id="signer-private-key" placeholder="المفتاح الخاص (0x...)" autocomplete="off">
        
        <textarea id="unsigned-tx-input" rows="5" placeholder="ألصق المعاملة غير الموقعة (JSON) التي تم نسخها من المحفظة الرئيسية"></textarea>
        
        <button id="sign-tx-btn">🔏 توقيع المعاملة</button>
        
        <div id="signed-output-area" class="hidden result-area">
            <label style="color:#F5B041;">✅ المعاملة الموقعة (نسخها وألصقها في المحفظة):</label>
            <textarea id="signed-raw-result" rows="3" readonly style="background:#0a0a0a;color:#0f0;"></textarea>
            <button id="copy-signed-tx" class="copy-btn">📋 نسخ التوقيع</button>
        </div>
        
        <div id="error-area" class="hidden result-area" style="border-color:#ff4444;">
            <label style="color:#ff8888;"></label>
            <div id="error-message" style="color:#ff8888;font-size:13px;"></div>
        </div>
    </div>
    

<script>
    const web3 = new Web3();
    
    // دالة لتحويل JSON إلى كائن معالجة BigInt بشكل صحيح
    function parseTransactionJSON(jsonString) {
        try {
            // أولاً نحول JSON العادي
            let rawObj = JSON.parse(jsonString);
            let txObject = {};
            
            // الحقول التي يجب أن تكون BigInt أو عدد
            const numericFields = ['value', 'gas', 'gasPrice', 'nonce', 'chainId'];
            
            for (let [key, value] of Object.entries(rawObj)) {
                if (numericFields.includes(key)) {
                    // إذا كانت القيمة نصاً رقمياً أو رقماً
                    if (typeof value === 'string') {
                        // محاولة تحويل النص إلى BigInt (إذا كان hex أو رقم عادي)
                        if (value.startsWith('0x')) {
                            txObject[key] = BigInt(value);
                        } else if (!isNaN(Number(value))) {
                            txObject[key] = BigInt(value);
                        } else {
                            txObject[key] = value;
                        }
                    } else if (typeof value === 'number') {
                        txObject[key] = BigInt(value);
                    } else if (typeof value === 'bigint') {
                        txObject[key] = value;
                    } else {
                        txObject[key] = value;
                    }
                } else {
                    // الحقول العادية (from, to, data)
                    txObject[key] = value;
                }
            }
            
            // التأكد من وجود from في الكائن
            if (!txObject.from) {
                throw new Error('المعاملة لا تحتوي على عنوان المرسل (from)');
            }
            
            return txObject;
        } catch(e) {
            throw new Error(`فشل تحويل JSON: ${e.message}`);
        }
    }
    
    // دالة لتحويل BigInt إلى String للتأكد من compatibility
    function normalizeTxForSigning(txObject) {
        let normalized = {};
        for (let [key, value] of Object.entries(txObject)) {
            if (typeof value === 'bigint') {
                normalized[key] = value.toString();
            } else {
                normalized[key] = value;
            }
        }
        return normalized;
    }
    
    // حدث التوقيع
    document.getElementById('sign-tx-btn').onclick = async () => {
        // إخفاء أي أخطاء سابقة
        document.getElementById('error-area').classList.add('hidden');
        document.getElementById('signed-output-area').classList.add('hidden');
        
        let privKey = document.getElementById('signer-private-key').value.trim();
        let unsignedJson = document.getElementById('unsigned-tx-input').value.trim();
        
        // التحقق من المدخلات
        if (!privKey) {
            showError('الرجاء إدخال المفتاح الخاص');
            return;
        }
        if (!unsignedJson) {
            showError('الرجاء لصق المعاملة غير الموقعة');
            return;
        }
        
        // تنسيق المفتاح الخاص
        if (!privKey.startsWith('0x')) {
            privKey = '0x' + privKey;
        }
        
        // التحقق من صحة المفتاح الخاص (64 حرف هيكس بعد 0x)
        if (privKey.length !== 66 || !/^0x[a-fA-F0-9]{64}$/.test(privKey)) {
            showError('المفتاح الخاص غير صالح (يجب أن يكون 64 حرف هيكس مع 0x في البداية)');
            return;
        }
        
        let txObject;
        try {
            // تحويل JSON إلى كائن مع معالجة BigInt
            txObject = parseTransactionJSON(unsignedJson);
            console.log('تم تحويل المعاملة:', txObject);
        } catch(e) {
            showError(e.message);
            return;
        }
        
        try {
            // استعادة الحساب من المفتاح الخاص
            let account;
            try {
                account = web3.eth.accounts.privateKeyToAccount(privKey);
            } catch(e) {
                showError('المفتاح الخاص غير صالح: ' + e.message);
                return;
            }
            
            // التحقق من تطابق العنوان (اختياري مع تحذير)
            if (txObject.from && account.address.toLowerCase() !== txObject.from.toLowerCase()) {
                const userConfirmed = confirm(
                    `⚠️ تحذير: عنوان محفظتك (${account.address})\n` +
                    `لا يطابق عنوان المرسل في المعاملة (${txObject.from})\n\n` +
                    `هل تريد التوقيع على أي حال؟`
                );
                if (!userConfirmed) {
                    return;
                }
            }
            
            // تحضير المعاملة للتوقيع (تأكد من أن كل الحقول صحيحة)
            const txToSign = {
                from: txObject.from || account.address,
                to: txObject.to,
                value: txObject.value ? web3.utils.toHex(txObject.value.toString()) : '0x0',
                gas: txObject.gas ? web3.utils.toHex(txObject.gas.toString()) : web3.utils.toHex(21000),
                gasPrice: txObject.gasPrice ? web3.utils.toHex(txObject.gasPrice.toString()) : undefined,
                nonce: txObject.nonce ? web3.utils.toHex(txObject.nonce.toString()) : undefined,
                chainId: txObject.chainId || 56
            };
            
            // إضافة data إذا وجدت (لـ USDT والـ smart contracts)
            if (txObject.data) {
                txToSign.data = txObject.data;
            }
            
            // إزالة الحقول الغير محددة
            Object.keys(txToSign).forEach(key => {
                if (txToSign[key] === undefined || txToSign[key] === null) {
                    delete txToSign[key];
                }
            });
            
            console.log('المعاملة للتوقيع:', txToSign);
            
            // توقيع المعاملة
            let signedTx;
            try {
                signedTx = await web3.eth.accounts.signTransaction(txToSign, privKey);
            } catch(e) {
                showError('فشل في توقيع المعاملة: ' + e.message);
                return;
            }
            
            if (!signedTx || !signedTx.rawTransaction) {
                showError('لم يتم إنشاء التوقيع بشكل صحيح');
                return;
            }
            
            // عرض النتيجة
            document.getElementById('signed-raw-result').value = signedTx.rawTransaction;
            document.getElementById('signed-output-area').classList.remove('hidden');
            
            // تمرير النتيجة للأسفل
            document.getElementById('signed-output-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
        } catch(e) {
            console.error('خطأ عام:', e);
            showError('حدث خطأ غير متوقع: ' + e.message);
        }
    };
    
    // دالة عرض الأخطاء
    function showError(message) {
        const errorDiv = document.getElementById('error-area');
        const errorMsg = document.getElementById('error-message');
        errorMsg.innerText = message;
        errorDiv.classList.remove('hidden');
        document.getElementById('signed-output-area').classList.add('hidden');
        
        // تمرير إلى الخطأ
        errorDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        
        // إخفاء الخطأ بعد 5 ثواني
        setTimeout(() => {
            errorDiv.classList.add('hidden');
        }, 5000);
    }
    
    // نسخ التوقيع
    document.getElementById('copy-signed-tx').onclick = () => {
        let rawTx = document.getElementById('signed-raw-result').value;
        if (rawTx && rawTx.trim() !== '') {
            navigator.clipboard.writeText(rawTx).then(() => {
                const btn = document.getElementById('copy-signed-tx');
                const originalText = btn.innerText;
                btn.innerText = '✅ تم النسخ!';
                setTimeout(() => {
                    btn.innerText = originalText;
                }, 2000);
            }).catch(() => {
                alert('فشل النسخ، يمكنك نسخ النص يدوياً');
            });
        } else {
            alert('لا توجد معاملة موقعة للنسخ');
        }
    };
        
    // تحسين تجربة المستخدم: تنظيف عند تغيير المدخلات
    document.getElementById('unsigned-tx-input').addEventListener('focus', () => {
        document.getElementById('error-area').classList.add('hidden');
    });
    
    document.getElementById('signer-private-key').addEventListener('focus', () => {
        document.getElementById('error-area').classList.add('hidden');
    });
    
    // دعم لصق المعاملة من الحافظة مباشرة
    document.getElementById('unsigned-tx-input').addEventListener('paste', function(e) {
        setTimeout(() => {
            // يمكن إضافة تحقق سريع هنا إذا أردت
            console.log('تم لصق معاملة جديدة');
        }, 100);
    });
    
    </script>
</body>
</html>
